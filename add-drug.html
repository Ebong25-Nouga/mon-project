<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMMANDES</title>
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
        integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel='stylesheet'
        href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
</head>

<body>
    <header>
        <div class="header-left">
            <i class="fa-solid fa-bars second-bars"></i>
            <div class="header-left-container">
                <i class="fa-solid fa-circle-plus plus" style="color: #2653A4;"></i>
                <img src="/img/logo.jpg" alt="logo" class="logo">
            </div>
            <i class="fi fi-rr-menu-dots dots"></i>
        </div>
        <div class="header-right">
            <div class="left-icons-group">
                <i class="fa-solid fa-bars first-bars"></i>
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <div class="right-icons-group">
                <i class="fa-solid fa-bell"></i>
                <i class="fa-solid fa-message"></i>
                <i class="fa-solid fa-circle-user"></i>
            </div>
        </div>
    </header>
    <main class="add-drug-main">
        <aside>
            <ul class="links">
                <li>
                    <a href="/admin/index.html" class="link">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/commandes.html" class="link">
                        <i class="fa-solid fa-chart-simple"></i>
                        <span>Commandes</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/medicaments.html" class="link">
                        <i class="fa-solid fa-pills"></i>
                        <span>M&eacute;dicaments</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/users.html" class="link">
                        <i class="fa-solid fa-users"></i>
                        <span>Utilisateurs</span>
                    </a>
                </li>
            </ul>
        </aside>
        <section class="main-content drug-main-content">
            <div class="main-content-top">
                <div>Ajouter un m&eacute;dicament</div>
                <div class="breadcrumb">
                    <span class="current-page">Home</span>
                    <span>></span>
                    <span class="current-page">M&eacute;dicaments</span>
                    <span>></span>
                    <span>Ajouter un m&eacute;dicament</span>
                </div>
            </div>

            </div>

            <div class="add-drug">
                <p class="titre-add-drug">Informations sur le m&eacute;dicament</p>
                <form>
                    <div class="form-container">
                        <div>
                            <div class="form-input-group">
                                <label for="designation">D&eacute;signation</label>
                                <input type="text" placeholder="Entrez l'intitule" id="designation">
                            </div>
                            <div class="error"></div>
                        </div>
                        <div>
                            <div class="form-input-group">
                                <label for="description">Description</label>
                                <textarea placeholder="Entrez l'intitule" id="description"></textarea>
                            </div>
                            <div class="error"></div>
                        </div>
                        <div>
                            <div class="form-input-group">
                                <label for="pu">Prix Unitaire</label>
                                <input type="text" placeholder="Montant en FCFA" id="pu">
                            </div>
                            <div class="error"></div>
                        </div>
                    </div>

                        <hr>
                        <div class="right">
                            <input value="Enregistrer" type="submit" id="submitBtn">
                        </div>
                </form>
            </div>

            <p class="bottom-text" style="margin-top: 30px;">Designed and Developed by <span class="current-page">MT</span></p>
        </section>
    </main>

    <script src="add-drug.js"></script>    /admin/js/
</body>

</html>
